version: '3.9'

services:
  web:
    build: 
      context: ..
      dockerfile: docker/Dockerfile
    container_name: student-app
    ports:
      - "8080:80"

  mysql:
    image: mysql:8.0
    container_name: student-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: student_management
    ports:
      - "3306:3306"
